<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- TM monogram on the site's space background: navy gradient, teal
       letters, a four-point diffraction glint and a few tiny stars. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1929"/>
      <stop offset="0.55" stop-color="#0a1322"/>
      <stop offset="1" stop-color="#160d2e"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5EEAD4"/>
      <stop offset="1" stop-color="#2DD4BF"/>
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="12" fill="url(#bg)"/>

  <!-- tiny background stars -->
  <circle cx="52" cy="10" r="1.1" fill="#ffffff" opacity="0.75"/>
  <circle cx="9" cy="51" r="0.9" fill="#ffffff" opacity="0.5"/>
  <circle cx="56" cy="54" r="0.8" fill="#ffffff" opacity="0.45"/>
  <circle cx="33" cy="14" r="0.7" fill="#ffffff" opacity="0.4"/>

  <!-- four-point glint, top-left -->
  <circle cx="14" cy="12" r="3" fill="#ffffff" opacity="0.25"/>
  <path
    d="M14 6 C14.6 9.8 15.4 10.6 20 12 C15.4 13.4 14.6 14.2 14 18 C13.4 14.2 12.6 13.4 8 12 C12.6 10.6 13.4 9.8 14 6 Z"
    fill="#ffffff" opacity="0.95"/>

  <!-- T -->
  <path d="M7 24 H29 V31 H21.5 V47 H14.5 V31 H7 Z" fill="url(#teal)"/>
  <!-- M -->
  <path d="M33 47 V24 H39.5 L45 35.5 L50.5 24 H57 V47 H50.8 V35 L46.8 43.5 H43.2 L39.2 35 V47 Z" fill="url(#teal)"/>
</svg>
